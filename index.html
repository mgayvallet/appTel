<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <meta
      http-equiv="Content-Security-Policy"
      content="
      default-src 'none';
      script-src  'self' https://telegram.org 'unsafe-inline';
      style-src   'self' 'unsafe-inline';
      connect-src 'self';
      img-src     'self' data:;
      frame-src   'none';
      object-src  'none';
    "
    />

    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="no-referrer" />

    <title>Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #fff;
        --surface: #f5f5f5;
        --border: #ddd;
        --text: #000;
        --text-sub: #666;
      }

      html,
      body {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        -webkit-tap-highlight-color: transparent;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 500px;
        margin: 0 auto;
      }

      .pages {
        flex: 1;
        overflow: hidden;
        position: relative;
      }

      .pg {
        position: absolute;
        inset: 0;
        overflow-y: auto;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .pg.active {
        opacity: 1;
        pointer-events: auto;
      }

      .home-hero {
        padding: 20px 16px;
        border-bottom: 1px solid var(--border);
      }

      .home-h1 {
        font-size: 24px;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .home-sub {
        font-size: 12px;
        color: var(--text-sub);
      }

      .cat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 12px;
      }

      .cat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 16px;
        cursor: pointer;
        text-align: center;
        transition: background 0.15s;
      }
      .cat-card:active {
        background: #eee;
      }

      .cat-ico {
        font-size: 28px;
        margin-bottom: 8px;
      }
      .cat-name {
        font-size: 14px;
        font-weight: 500;
      }
      .cat-nb {
        font-size: 12px;
        color: var(--text-sub);
        margin-top: 4px;
      }

      .nav {
        background: #1c2118;
        border-top: 1px solid #2a3025;
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 10px 8px calc(10px + env(safe-area-inset-bottom, 0px));
        flex-shrink: 0;
      }

      .nav-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      .nav-btn span {
        font-size: 11px;
        font-weight: 500;
        color: #555;
        transition: color 0.2s;
      }

      .nav-btn.active span {
        color: #4ade4a;
      }

      .nav-ico-wrap {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        transition: all 0.2s;
      }

      .nav-btn svg {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: #555;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: stroke 0.2s;
      }

      .nav-btn.active .nav-ico-wrap {
        background: #4ade4a;
        width: 44px;
        height: 44px;
      }

      .nav-btn.active svg {
        stroke: #1c2118;
        width: 24px;
        height: 24px;
      }

      .nav-center-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        margin-top: -18px;
        -webkit-tap-highlight-color: transparent;
      }

      .nav-center-ring {
        width: 58px;
        height: 58px;
        border-radius: 50%;
        border: 2px solid #3a4a35;
        background: #1c2118;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.2s;
        position: relative;
      }

      .nav-center-btn.active .nav-center-ring {
        border-color: #4ade4a;
      }

      .nav-center-btn svg {
        width: 26px;
        height: 26px;
        fill: none;
        stroke: #555;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: stroke 0.2s;
      }

      .nav-center-btn.active svg {
        stroke: #4ade4a;
      }

      .nav-center-btn span {
        font-size: 11px;
        font-weight: 600;
        color: #555;
        transition: color 0.2s;
      }

      .nav-center-btn.active span {
        color: #fff;
      }

      .nav-badge {
        position: absolute;
        top: -4px;
        right: -4px;
        background: var(--danger);
        color: white;
        font-size: 9px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .nav-badge.on {
        display: flex;
      }

      #navToast {
        position: fixed;
        bottom: 70px;
        left: 50%;
        transform: translateX(-50%) scale(0.9);
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 8px 16px;
        font-size: 12px;
        border-radius: 20px;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.2s,
          transform 0.2s;
        z-index: 100;
      }
      #navToast.show {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="pages">
        <div class="pg active" id="pg-home">
          <div class="home-hero">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polygon points="3 4 21 4 14 12 14 19 10 21 10 12 3 4"></polygon>
            </svg>
            <h1 class="home-h1">Boutique</h1>
            <p class="home-sub">Découvrez nos collections</p>
          </div>
          <div class="cat-grid" id="catGrid"></div>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" id="nav-home" onclick="goHome()">
          <div class="nav-ico-wrap">
            <svg viewBox="0 0 24 24">
              <path d="M3 12L12 3l9 9" />
              <path d="M9 21V12h6v9" />
              <path d="M5 10v11h14V10" />
            </svg>
          </div>
          <span>Accueil</span>
        </button>

        <button class="nav-btn" id="nav-reviews" onclick="openReviews()">
          <div class="nav-ico-wrap">
            <svg viewBox="0 0 24 24">
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
              />
            </svg>
          </div>
          <span>Avis</span>
        </button>

        <button class="nav-center-btn" id="nav-cart" onclick="openCart()">
          <div class="nav-center-ring">
            <svg viewBox="0 0 24 24">
              <circle cx="9" cy="21" r="1" />
              <circle cx="20" cy="21" r="1" />
              <path
                d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
              />
            </svg>
            <span class="nav-badge" id="navBadge"></span>
          </div>
          <span>Panier</span>
        </button>

        <button class="nav-btn" id="nav-info" onclick="openInfo()">
          <div class="nav-ico-wrap">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="8" stroke-width="2.5" />
              <line x1="12" y1="12" x2="12" y2="16" />
            </svg>
          </div>
          <span>Infos</span>
        </button>

        <button class="nav-btn" id="nav-contact" onclick="openContact()">
          <div class="nav-ico-wrap">
            <svg viewBox="0 0 24 24">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <polyline points="2,4 12,13 22,4" />
            </svg>
          </div>
          <span>Contact</span>
        </button>
      </nav>
    </div>

    <div id="navToast"></div>

    <script>
      let CATALOG = { categories: [] };

      async function loadCatalog() {
        try {
          const response = await fetch("articles.json");
          CATALOG = await response.json();
          renderHome();
        } catch (e) {
          console.error("Erreur chargement articles:", e);
          CATALOG = { categories: [] };
        }
      }

      function renderHome() {
        const g = document.getElementById("catGrid");
        g.innerHTML = "";
        CATALOG.categories.forEach((cat) => {
          const d = document.createElement("div");
          d.className = "cat-card";
          d.setAttribute("role", "button");
          d.setAttribute("tabindex", "0");
          d.innerHTML =
            `<span class="cat-ico">${escHtml(cat.emoji)}</span>` +
            `<div class="cat-name">${escHtml(cat.nom)}</div>` +
            `<div class="cat-nb">${cat.produits.length} articles</div>`;
          d.onclick = () => console.log("Catégorie: " + cat.id);
          g.appendChild(d);
        });
      }

      function goHome() {
        console.log("Retour à l'accueil");
      }

      function openCart() {
        showNavToast("Panier - Bientôt disponible");
      }

      function openInfo() {
        showNavToast("Section Info - Bientôt disponible");
      }

      function openContact() {
        showNavToast("Section Contact - Bientôt disponible");
      }

      function openReviews() {
        showNavToast("Section Avis - Bientôt disponible");
      }

      let navToastTimer;
      function showNavToast(msg) {
        const el = document.getElementById("navToast");
        el.textContent = msg;
        el.classList.add("show");
        clearTimeout(navToastTimer);
        navToastTimer = setTimeout(() => el.classList.remove("show"), 2000);
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      const tg = window.Telegram?.WebApp ?? null;
      if (tg) {
        tg.ready();
        tg.expand();
        try {
          tg.setHeaderColor("#ffffff");
        } catch (_) {}
        try {
          tg.setBackgroundColor("#ffffff");
        } catch (_) {}
      }

      loadCatalog();
    </script>
  </body>
</html>
